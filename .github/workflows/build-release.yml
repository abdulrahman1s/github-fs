name: Build and Release

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: >-
    ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

env:
  BIN_NAME: ghfs
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release please
    # Only manage releases from pushes to the default branch (or manual dispatch
    # against it). Release PRs themselves run through the build job below for CI.
    if: >-
      ${{
        (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build and test (${{ matrix.target }})
    needs:
      - release-please
    # Build runs on every push/PR. We only skip if release-please outright
    # failed; "skipped" (non-default-branch CI) is the common case.
    if: ${{ always() && needs.release-please.result != 'failure' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Native arm64 runner; cross-compiling glibc binaries from
          # x86_64 needs a sysroot we don't want to maintain, and
          # cross's QEMU path slows tests down ~5x.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.sha || github.sha }}

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          shared-key: build
          cache-on-failure: true
          cache-all-crates: true

      - name: Check formatting
        run: cargo fmt --check

      - name: Check
        run: cargo check --locked --all-targets

      - name: Lint
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release binary
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p dist
          cp "target/release/${BIN_NAME}" "dist/${BIN_NAME}"
          archive="${BIN_NAME}-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "${archive}" "${BIN_NAME}"
          shasum -a 256 "${archive}" > "${archive}.sha256"

      - name: Upload release artifact
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN_NAME }}-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release-upload:
    name: Attach binaries to release
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.build.result == 'success' }}
    needs:
      - release-please
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-${{ needs.release-please.outputs.tag_name }}-*
          path: dist
          merge-multiple: true

      - name: Upload assets and publish draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" dist/* --clobber
          gh release edit "$TAG" --draft=false --latest
